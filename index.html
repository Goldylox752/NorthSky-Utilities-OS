<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NorthSky AI Auditor</title>

<style>
body {
  font-family: system-ui, Arial;
  background: #0b1220;
  color: white;
  margin: 0;
  display: flex;
  justify-content: center;
  padding: 40px;
}

.container {
  width: 100%;
  max-width: 750px;
}

.card {
  background: #111827;
  padding: 20px;
  border-radius: 14px;
  margin-top: 15px;
}

h1 {
  font-size: 28px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  background: #38bdf8;
  color: black;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

pre {
  white-space: pre-wrap;
  line-height: 1.5;
}
</style>
</head>

<body>

<div class="container">

<h1>🌌 NorthSky AI Auditor</h1>

<div class="card">
  <small>Enter website</small>
  <input id="site" placeholder="example.com" />
  <button id="btn" onclick="analyzeSite()">Analyze Website</button>
</div>

<div id="output" class="card">
  Waiting for analysis...
</div>

</div>

<script>

const state = {
  loading: false,
  uses: parseInt(localStorage.getItem("ns_uses") || "0"),
  freeLimit: 3
};

// =========================
// MAIN FUNCTION
// =========================
async function analyzeSite() {
  const siteInput = document.getElementById("site");
  const output = document.getElementById("output");
  const btn = document.getElementById("btn");

  let site = siteInput.value.trim();

  if (!site) return output.innerText = "⚠️ Enter a website";
  if (!site.includes(".")) return output.innerText = "⚠️ Invalid website";

  if (!site.startsWith("http")) site = "https://" + site;

  if (state.uses >= state.freeLimit) {
    output.innerHTML = `
      🚫 Free limit reached
      <br><br>
      <button onclick="alert('Upgrade system here')">Upgrade</button>
    `;
    return;
  }

  state.uses++;
  localStorage.setItem("ns_uses", state.uses);

  setLoading(true);
  output.innerText = "🤖 Analyzing website...";

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ site })
    });

    if (!res.ok) throw new Error("API failed");

    const data = await res.json();
    const text = data?.result;

    if (!text) {
      output.innerText = "⚠️ No AI response";
      return;
    }

    const parsed = parseAI(text);

    output.innerHTML = `
      <h2>📊 Audit Report</h2>

      <p><b>SEO:</b> ${parsed.seo}</p>
      <p><b>UX:</b> ${parsed.ux}</p>
      <p><b>Conversion:</b> ${parsed.conv}</p>

      <hr>

      <pre>${text}</pre>
    `;

  } catch (err) {
    console.error(err);
    output.innerText = "⚠️ Failed to analyze site";
  }

  setLoading(false);
}

// =========================
// SAFE PARSER (ROBUST)
// =========================
function parseAI(text) {
  return {
    seo: match(text, "SEO Score"),
    ux: match(text, "UX Score"),
    conv: match(text, "Conversion Score")
  };
}

function match(text, key) {
  const regex = new RegExp(key + ":\\s*(\\d+\\/\\d+)", "i");
  const m = text.match(regex);
  return m ? m[1] : "N/A";
}

// =========================
// LOADING STATE
// =========================
function setLoading(isLoading) {
  const btn = document.getElementById("btn");
  state.loading = isLoading;

  btn.disabled = isLoading;
  btn.innerText = isLoading ? "Analyzing..." : "Analyze Website";
}

</script>

</body>
</html>
