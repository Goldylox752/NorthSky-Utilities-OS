<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky AI | Website Grader</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  font-size:2.4rem;
  margin-bottom:10px;
}

p{
  opacity:0.9;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  margin-top:25px;
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  padding:14px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}

.btn:hover{
  transform:scale(1.02);
  opacity:0.9;
}

textarea{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:12px;
  height:90px;
}

#output{
  margin-top:15px;
  padding:15px;
  background:#0f172a;
  border-radius:8px;
  text-align:left;
  line-height:1.5;
}

.trust{
  color:#22c55e;
  margin-top:10px;
  font-size:0.95rem;
}

.divider{
  margin:25px auto;
  width:60%;
  height:1px;
  background:#1e293b;
}
</style>
</head>

<body>

<!-- 🔥 HERO -->
<h1>This AI Shows Why Your Website Is Losing Customers</h1>

<p>
Get a score, find your biggest problems, and fix them in minutes.
</p>

<p class="trust">
Used by 1,200+ businesses to improve their websites ⚡
</p>

<!-- TOOL -->
<div class="card">
  <h3>Analyze Your Website</h3>

  <textarea id="site" placeholder="Paste your website URL..."></textarea>

  <button onclick="analyzeSite()" class="btn">
    Analyze Website
  </button>

  <div id="output"></div>

  <!-- LOOP BUTTON -->
  <button onclick="analyzeSite()" class="btn">
    Re-analyze After Fixes
  </button>
</div>

<div class="divider"></div>

<!-- 💰 UPSELL -->
<div class="card">
  <h3>🔓 Unlock Full System</h3>
  <p>$9 one-time</p>

  <a href="https://buy.stripe.com/bJe7sE9KXdX63JBeDC2ZO0t?success_url=https://north-sky-ai.vercel.app/success.html">
    <button class="btn">Unlock Unlimited</button>
  </a>
</div>

<script>
let paid = localStorage.getItem("paid") === "true";

function analyzeSite() {
  const input = document.getElementById("site").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter your website URL";
    return;
  }

  let score = 90;
  let issues = [];

  if (!input.includes("http")) {
    issues.push("No proper URL format detected");
    score -= 10;
  }

  if (input.length < 15) {
    issues.push("Low content depth detected");
    score -= 15;
  }

  if (!input.includes(".")) {
    issues.push("Invalid domain structure");
    score -= 10;
  }

  // Simulated realistic issues
  issues.push("No clear offer (users leave quickly)");
  issues.push("Missing trust signals (low credibility)");
  issues.push("Weak call-to-action (low conversions)");

  score = Math.max(50, score);

  let preview = `
  <strong>Website Score: ${score}/100 ⚠️</strong><br>
  ⚠️ You are likely losing 30–50% of potential customers<br><br>

  ✔ Design: Decent<br>
  ❌ SEO: Weak<br>
  ❌ Conversion: Poor<br><br>

  <strong>Top Issues:</strong><br>
  ${issues.map(i => "- " + i).join("<br>")}
  `;

  if (!paid) {
    output.innerHTML = preview + `
      <br><br>
      🔒 See exactly how to fix this and increase conversions<br><br>

      <a href="https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u?success_url=https://north-sky-ai.vercel.app/success.html">
        <button class="btn">Unlock Full Report ($9)</button>
      </a>
    `;
    return;
  }

  output.innerHTML = preview + `
    <br><br>
    <strong>How to Improve:</strong><br><br>

    + Add strong headline → +15 points<br>
    + Add testimonials → +10 points<br>
    + Add trust badges → +10 points<br>
    + Improve CTA → +15 points<br><br>

    <strong>Potential Score: ${score + 30}+/100 🚀</strong><br><br>
  `;
}
</script>

</body>
</html>
