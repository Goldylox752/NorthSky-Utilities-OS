<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NorthSky AI | Website Grader</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#020617;
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  font-size:2.4rem;
  margin-bottom:10px;
}

p{
  opacity:0.9;
}

.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  margin-top:25px;
  max-width:520px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  padding:14px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
  margin-top:12px;
}

.btn:hover{
  transform:scale(1.02);
  opacity:0.9;
}

textarea, input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin-top:12px;
}

textarea{
  height:90px;
}

#output{
  margin-top:15px;
  padding:15px;
  background:#0f172a;
  border-radius:8px;
  text-align:left;
}

.trust{
  color:#22c55e;
  margin-top:10px;
}

.report{
  background:#0f172a;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
  text-align:left;
}
</style>
</head>

<body>

<h1>This AI Shows Why Your Website Is Losing Customers</h1>

<p>Get a score, find your biggest problems, and fix them in minutes.</p>

<p class="trust">Used by 1,200+ businesses ⚡</p>

<!-- 👤 ACCOUNT -->
<div class="card">
  <h3>👤 Your Account</h3>

  <input id="email" placeholder="Enter your email">

  <button onclick="saveUser()" class="btn">Save Account</button>

  <p id="userStatus"></p>
</div>

<!-- TOOL -->
<div class="card">
  <h3>Analyze Your Website</h3>

  <textarea id="site" placeholder="Paste your website URL..."></textarea>

  <button onclick="analyzeSite()" class="btn">Analyze Website</button>

  <div id="output"></div>

  <button onclick="analyzeSite()" class="btn">Re-analyze After Fixes</button>
</div>

<!-- 💰 UPSELL -->
<div class="card">
  <h3>🔓 Unlock Full System</h3>
  <p>$9 one-time</p>

  <a href="https://buy.stripe.com/bJe7sE9KXdX63JBeDC2ZO0t?success_url=https://north-sky-ai.vercel.app/success.html">
    <button class="btn">Unlock Unlimited</button>
  </a>
</div>

<!-- 📊 REPORTS -->
<div class="card">
  <h3>📊 Your Saved Reports</h3>
  <div id="reports"></div>

  <button onclick="loadReports()" class="btn">Refresh Reports</button>
</div>

<script>
let paid = localStorage.getItem("paid") === "true";

// 👤 SAVE USER
function saveUser() {
  const email = document.getElementById("email").value;

  if (!email) return;

  localStorage.setItem("userEmail", email);

  document.getElementById("userStatus").innerText = "✅ Account saved";
}

// 📊 LOAD REPORTS
function loadReports() {
  const reports = JSON.parse(localStorage.getItem("reports") || "[]");
  const container = document.getElementById("reports");

  container.innerHTML = "";

  if (reports.length === 0) {
    container.innerHTML = "No reports yet";
    return;
  }

  reports.slice().reverse().forEach(r => {
    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <strong>${r.site}</strong><br>
      <small>${r.date}</small><br><br>
      ${r.result.substring(0, 150)}...
    `;

    container.appendChild(div);
  });
}

// 🧠 AI ANALYSIS
async function analyzeSite() {
  const input = document.getElementById("site").value;
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter your website URL";
    return;
  }

  output.innerText = "Analyzing... 🤖";

  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ site: input })
    });

    const data = await res.json();

    if (!data.result) {
      output.innerText = "Analysis failed";
      return;
    }

    let preview = data.result.split("\n").slice(0, 5).join("<br>");

    // 🔒 PAYWALL
    if (!paid) {
      output.innerHTML = `
        ${preview}<br><br>
        🔒 See exactly how to fix this and increase conversions<br><br>

        <a href="https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u?success_url=https://north-sky-ai.vercel.app/success.html">
          <button class="btn">Unlock Full Report ($9)</button>
        </a>
      `;
      return;
    }

    // 💰 SAVE REPORT (only paid users)
    const email = localStorage.getItem("userEmail");

    if (email) {
      const reports = JSON.parse(localStorage.getItem("reports") || "[]");

      reports.push({
        site: input,
        result: data.result,
        date: new Date().toLocaleString()
      });

      localStorage.setItem("reports", JSON.stringify(reports));
    }

    // 💰 FULL OUTPUT
    output.innerHTML = data.result.replace(/\n/g, "<br>");

    loadReports();

  } catch (err) {
    output.innerText = "Connection failed";
  }
}

// 🚀 INIT
loadReports();
</script>

</body>
</html>
