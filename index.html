<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NorthSky AI</title>

  <style>
    body {
      font-family: Arial;
      background: #0b1220;
      color: white;
      padding: 20px;
    }

    input, button {
      padding: 10px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      cursor: pointer;
      background: #38bdf8;
      color: black;
      font-weight: bold;
    }

    #output {
      margin-top: 15px;
      padding: 15px;
      background: #111827;
      border-radius: 10px;
      min-height: 100px;
    }
  </style>
</head>

<body>

  <h1>🌌 NorthSky AI Auditor</h1>

  <input id="site" placeholder="Enter website (example.com)">
  <button onclick="NorthSky.analyze()">Analyze</button>

  <div id="output"></div>

  <hr>

  <input id="email" placeholder="Email">
  <button onclick="NorthSky.saveUser()">Save</button>

  <div id="userStatus"></div>
  <div id="usageStatus"></div>

<script>
// =============================
// 🌌 NORTHSKY CORE ENGINE (CLEAN PRO)
// =============================

const NorthSky = {
  state: {
    paid: false,
    uses: parseInt(localStorage.getItem("ns_uses") || "0"),
    email: localStorage.getItem("ns_email") || null
  },

  config: {
    freeLimit: 3,
    checkout: {
      "one-time": "https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u",
      "monthly": "https://buy.stripe.com/00w8wIg9lf1a0xpbrq2ZO0v"
    }
  }
};

// =============================
NorthSky.init = async function () {
  this.updateStatus();
  if (this.state.email) await this.checkAccess();
};

// =============================
NorthSky.checkAccess = async function () {
  try {
    const res = await fetch("/api/check-user", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: this.state.email })
    });

    const data = await res.json();
    this.state.paid = !!data?.paid;

  } catch (err) {
    console.error(err);
    this.state.paid = false;
  }

  this.updateStatus();
};

// =============================
NorthSky.updateStatus = function () {
  const el = document.getElementById("usageStatus");
  if (!el) return;

  el.innerHTML = this.state.paid
    ? "✅ Pro — Unlimited Access"
    : `⚠️ Free Plan — ${Math.max(0, this.config.freeLimit - this.state.uses)} uses left`;
};

// =============================
NorthSky.saveUser = function () {
  const email = document.getElementById("email").value.trim();

  if (!email.includes("@")) {
    alert("Enter valid email");
    return;
  }

  this.state.email = email;
  localStorage.setItem("ns_email", email);

  document.getElementById("userStatus").innerText = "✅ Saved";

  this.checkAccess();
};

// =============================
NorthSky.checkout = function () {
  if (!this.state.email) return alert("Enter email first");

  window.location.href =
    this.config.checkout["one-time"] +
    `?prefilled_email=${encodeURIComponent(this.state.email)}`;
};

// =============================
NorthSky.delay = (ms) => new Promise(r => setTimeout(r, ms));

// =============================
NorthSky.callAI = async function (site) {
  const res = await fetch("/api/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      site,
      prompt: `
You are a senior website auditor.

Analyze: ${site}

Return:

SEO Score: X/100
UX Score: X/100
Conversion Score: X/100

Issues:
- 3-5 issues

Recommendations:
- 3-5 fixes
`
    })
  });

  return await res.json();
};

// =============================
NorthSky.analyze = async function () {
  const siteInput = document.getElementById("site");
  const output = document.getElementById("output");

  let site = siteInput.value.trim();

  if (!site) return (output.innerText = "Enter website");
  if (!site.includes(".")) return (output.innerText = "Invalid website");

  if (!site.startsWith("http")) site = "https://" + site;

  if (!this.state.paid && this.state.uses >= this.config.freeLimit) {
    output.innerHTML = `
      🚫 Free limit reached<br><br>
      <button onclick="NorthSky.checkout()">Upgrade 🚀</button>
    `;
    return;
  }

  this.state.uses++;
  localStorage.setItem("ns_uses", this.state.uses);
  this.updateStatus();

  output.innerHTML = "🤖 Analyzing website...";

  await this.delay(600);

  try {
    const data = await this.callAI(site);

    const result =
      data.result ||
      data.output?.[0]?.content?.[0]?.text;

    if (!result) {
      output.innerHTML = "⚠️ No AI response";
      return;
    }

    const seo = result.match(/SEO Score:\s*(\d+)/)?.[1];
    const ux = result.match(/UX Score:\s*(\d+)/)?.[1];
    const conv = result.match(/Conversion Score:\s*(\d+)/)?.[1];

    output.innerHTML = `
      <h3>📊 AI Report</h3>

      <p>SEO: ${seo || "N/A"}/100</p>
      <p>UX: ${ux || "N/A"}/100</p>
      <p>Conversion: ${conv || "N/A"}/100</p>

      <pre>${result}</pre>
    `;

  } catch (err) {
    console.error(err);
    output.innerHTML = "⚠️ AI failed";
  }
};

// =============================
NorthSky.init();
</script>

</body>
</html>
