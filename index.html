<script>
// =============================
// 🔐 GLOBAL STATE
// =============================
let state = {
  paid: false,
  uses: parseInt(localStorage.getItem("uses") || "0"),
  email: localStorage.getItem("userEmail") || null
};

// =============================
// 🔄 INIT
// =============================
init();

async function init() {
  updateStatus();
  if (state.email) await checkAccess();
}

// =============================
// 🔐 CHECK ACCESS (BACKEND)
// =============================
async function checkAccess() {
  try {
    const res = await fetch("/api/check-user", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ email: state.email })
    });

    const data = await res.json();
    state.paid = data?.paid || false;

  } catch (err) {
    console.error("Access check failed:", err);
    state.paid = false;
  }

  updateStatus();
}

// =============================
// 📊 STATUS UI
// =============================
function updateStatus() {
  const el = document.getElementById("usageStatus");

  if (state.paid) {
    el.innerHTML = "✅ Pro User — Unlimited Access";
  } else {
    const remaining = Math.max(0, 3 - state.uses);
    el.innerHTML = `⚠️ Free Plan — ${remaining} analyses left`;
  }
}

// =============================
// 👤 SAVE USER
// =============================
function saveUser() {
  const email = document.getElementById("email").value.trim();

  if (!email || !email.includes("@")) {
    alert("Enter a valid email");
    return;
  }

  state.email = email;
  localStorage.setItem("userEmail", email);

  document.getElementById("userStatus").innerText = "✅ Saved";

  checkAccess();
}

// =============================
// 💳 STRIPE CHECKOUT
// =============================
function goToCheckout(type = "one-time") {
  if (!state.email) {
    alert("Enter your email first");
    return;
  }

  const links = {
    "one-time": "https://buy.stripe.com/cNi6oA1eraKU7ZR1QQ2ZO0u",
    "monthly": "https://buy.stripe.com/00w8wIg9lf1a0xpbrq2ZO0v"
  };

  const url = `${links[type]}?prefilled_email=${encodeURIComponent(state.email)}`;
  window.location.href = url;
}

// =============================
// 🧠 SCORE ENGINE (IMPROVED)
// =============================
function calculateScore(input) {
  let score = 55;

  if (input.includes("shop") || input.includes("store")) score += 10;
  if (input.includes("ai")) score += 5;
  if (input.includes("https")) score += 5;
  if (input.length > 20) score += 5;

  // simulate realism
  score += Math.floor(Math.random() * 8);

  return Math.min(score, 92);
}

// =============================
// 🎬 UX DELAY
// =============================
function delay(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// =============================
// 🚀 MAIN ANALYSIS
// =============================
async function analyzeSite() {
  const inputRaw = document.getElementById("site").value.trim();
  const input = inputRaw.toLowerCase();
  const output = document.getElementById("output");

  if (!input) {
    output.innerText = "Enter your website URL";
    return;
  }

  // 🚫 LIMIT
  if (!state.paid && state.uses >= 3) {
    output.innerHTML = `
      🚫 Free limit reached (3 analyses)<br><br>

      <div class="highlight">
        Most users increase conversions by 30–50%
      </div><br>

      <button class="btn" onclick="goToCheckout()">
        Unlock Full Access
      </button>
    `;
    return;
  }

  // increment usage
  state.uses++;
  localStorage.setItem("uses", state.uses);
  updateStatus();

  // =============================
  // 🎬 LOADING EXPERIENCE
  // =============================
  output.innerHTML = `
    🤖 Analyzing your website...<br><br>
    🔍 Checking SEO...
  `;

  await delay(600);
  output.innerHTML += "<br>📊 Evaluating conversions...";
  await delay(600);
  output.innerHTML += "<br>⚡ Generating report...<br><br>";

  const score = calculateScore(input);

  // =============================
  // 🔒 FREE VERSION (CONVERSION OPTIMIZED)
  // =============================
  if (!state.paid) {
    output.innerHTML += `
      <strong>📊 Website Score: ${score}/100</strong><br><br>

      ❌ Weak call-to-action<br>
      ❌ Missing trust signals<br>
      ❌ Poor headline clarity<br><br>

      <div class="highlight">
        🔒 See exactly how to increase conversions by 30%+
      </div><br>

      <strong>${score} → ${score + 25}+ 🚀</strong><br><br>

      <button class="btn" onclick="goToCheckout()">
        Unlock Full Report ($9)
      </button>
    `;
    return;
  }

  // =============================
  // 💰 REAL GPT BACKEND
  // =============================
  try {
    const res = await fetch("/api/analyze", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ site: inputRaw })
    });

    const data = await res.json();

    output.innerHTML = `
      <strong>📊 Real AI Analysis</strong><br><br>
      ${data.result.replace(/\n/g, "<br>")}
    `;

  } catch (err) {
    console.error(err);
    output.innerHTML = "⚠️ Failed to load AI analysis";
  }
}
</script>
