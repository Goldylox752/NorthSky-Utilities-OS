<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>NorthSky OS · Revenue Intelligence Hub</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    body {
      margin: 0;
      font-family: Inter, sans-serif;
      background: radial-gradient(circle at top, #0b1024, #02040e);
      color: white;
    }

    .container { max-width: 1100px; margin: auto; padding: 20px; }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 15px 0;
      border-bottom: 1px solid #1f2937;
    }

    .logo { font-weight: 800; font-size: 22px; }

    .hero { text-align: center; margin: 30px 0; }

    .hero h1 { font-size: 32px; }

    .kpi { display: flex; gap: 10px; flex-wrap: wrap; }

    .card {
      background: #0f172a;
      padding: 15px;
      border-radius: 16px;
      flex: 1;
      min-width: 200px;
    }

    button {
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }

    .primary { background: #3b82f6; color: white; }

    .stripe { background: #635bff; color: white; width: 100%; margin-top: 10px; }

    /* PAYWALL */
    .paywall {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .box {
      background: #0f172a;
      padding: 25px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<!-- PAYWALL -->
<div class="paywall" id="paywall">
  <div class="box">
    <h2>NorthSky Access</h2>
    <p>Purchase access to continue</p>

    <button class="stripe" id="plan1">Buy Basic</button>
    <button class="stripe" id="plan2">Buy Pro</button>
    <button class="stripe" id="plan3">Buy Enterprise</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" class="hidden">
  <div class="container">

    <div class="nav">
      <div class="logo">NorthSky OS</div>
      <button id="logoutBtn">Logout</button>
    </div>

    <div class="hero">
      <h1>Revenue Intelligence Hub</h1>
    </div>

    <div class="kpi">
      <div class="card">
        <h3>Score</h3>
        <p id="score">0</p>
      </div>

      <div class="card">
        <h3>Revenue</h3>
        <p id="revenue">$0</p>
      </div>
    </div>

  </div>
</div>

<script>
(function () {

  const AUTH_KEY = "nsky_auth";

  function isAuth() {
    return sessionStorage.getItem(AUTH_KEY) === "true";
  }

  function unlock() {
    sessionStorage.setItem(AUTH_KEY, "true");
    document.getElementById("paywall").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
  }

  function lock() {
    sessionStorage.removeItem(AUTH_KEY);
    document.getElementById("paywall").style.display = "flex";
    document.getElementById("app").classList.add("hidden");
  }

  // ---------- STRIPE ----------
  async function checkout(plan) {
    const res = await fetch("/api/create-checkout-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ plan })
    });

    const data = await res.json();

    if (data.url) {
      window.location.href = data.url;
    }
  }

  // ---------- VERIFY ----------
  async function verify() {
    const session_id = new URLSearchParams(window.location.search).get("session_id");

    if (!session_id) return;

    const res = await fetch("/api/verify-session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id })
    });

    const data = await res.json();

    if (data.valid) {
      unlock();
    }
  }

  // ---------- EVENTS ----------
  document.getElementById("plan1").onclick = () => checkout("basic");
  document.getElementById("plan2").onclick = () => checkout("pro");
  document.getElementById("plan3").onclick = () => checkout("enterprise");

  document.getElementById("logoutBtn").onclick = lock;

  // ---------- INIT ----------
  function init() {
    if (isAuth()) {
      document.getElementById("paywall").style.display = "none";
      document.getElementById("app").classList.remove("hidden");
    }

    verify();
  }

  init();

})();
</script>

</body>
</html>
